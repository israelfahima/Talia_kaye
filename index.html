<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בחירת שפת פוסטר</title>
  <meta name="description" content="Poster language selection page." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #173765;
      --blue: #2563a8;
      --red: #c0392b;
      --text: #24364a;
      --white: #ffffff;
      --border: rgba(37, 99, 168, 0.18);
      --shadow: 0 24px 70px rgba(23, 55, 101, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Noto Sans Hebrew', 'Inter', system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(37,99,168,0.15), transparent 34rem),
        radial-gradient(circle at bottom left, rgba(192,57,43,0.10), transparent 30rem),
        linear-gradient(135deg, #f7fbff 0%, #eef6fc 45%, #ffffff 100%);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
    }

    .wrap {
      width: min(980px, 100%);
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .topbar {
      height: 7px;
      background: linear-gradient(90deg, var(--navy), var(--blue), var(--red));
    }

    .content {
      min-height: 320px;
      padding: 56px 58px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      padding: 15px 30px;
      border-radius: 16px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 800;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .btn.primary {
      color: white;
      background: var(--navy);
      box-shadow: 0 14px 28px rgba(23,55,101,0.18);
    }

    .btn.secondary {
      color: var(--navy);
      background: white;
      border: 1px solid var(--border);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(23,55,101,0.18);
    }

    @media (max-width: 820px) {
      .content { padding: 42px 22px 36px; min-height: 260px; }
      .btn { width: 100%; }
      .wrap { border-radius: 24px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="wrap" aria-label="עמוד בחירת שפת פוסטר">
      <div class="topbar"></div>

      <div class="content">
        <div class="buttons" aria-label="בחירת שפה">
          <a class="btn secondary" href="he.html">עברית</a>
          <a class="btn primary" href="en.html">English</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
