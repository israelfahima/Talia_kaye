<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sexual Health Education Initiative</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;700;800&family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --navy:#173765;
      --blue:#2563a8;
      --red:#c0392b;
      --bg:#f4f8fc;
      --text:#24364a;
      --muted:#6b7b8c;
      --white:#ffffff;
      --border:rgba(37,99,168,0.14);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:
        radial-gradient(circle at top right, rgba(37,99,168,0.12), transparent 35rem),
        linear-gradient(135deg,#f7fbff 0%,#eef5fb 100%);
      font-family:'Noto Sans Hebrew','Inter',sans-serif;
      color:var(--text);
    }

    .container{
      width:min(920px,100%);
      background:rgba(255,255,255,0.94);
      border:1px solid rgba(255,255,255,0.9);
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 24px 70px rgba(23,55,101,0.16);
      backdrop-filter:blur(10px);
    }

    .topbar{
      height:6px;
      background:linear-gradient(90deg,var(--navy),var(--blue),var(--red));
    }

    .content{
      padding:64px 56px 56px;
      text-align:center;
    }

    .tag{
      display:inline-block;
      background:#eef4fb;
      color:var(--blue);
      border:1px solid rgba(37,99,168,0.14);
      padding:8px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      margin-bottom:24px;
    }

    h1{
      margin:0;
      color:var(--navy);
      font-size:42px;
      line-height:1.3;
      font-weight:800;
      letter-spacing:-0.02em;
    }

    .authors{
      margin-top:28px;
      font-size:18px;
      font-weight:700;
      color:var(--text);
    }

    .affiliation{
      margin-top:10px;
      font-size:15px;
      color:var(--muted);
      line-height:1.7;
    }

    .event{
      margin-top:26px;
      font-size:15px;
      color:var(--blue);
      font-weight:700;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:18px;
      margin-top:42px;
      flex-wrap:wrap;
    }

    .btn{
      text-decoration:none;
      color:white;
      background:var(--navy);
      padding:16px 34px;
      border-radius:16px;
      font-size:18px;
      font-weight:700;
      transition:.18s ease;
      min-width:180px;
    }

    .btn:hover{
      transform:translateY(-2px);
      background:var(--blue);
    }

    .btn.secondary{
      background:white;
      color:var(--navy);
      border:1px solid var(--border);
    }

    .btn.secondary:hover{
      background:#f4f8fc;
    }

    @media(max-width:720px){

      .content{
        padding:44px 24px;
      }

      h1{
        font-size:30px;
      }

      .authors{
        font-size:16px;
      }

      .btn{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <main class="container">

    <div class="topbar"></div>

    <section class="content">

      <div class="tag">
        Conference Poster Presentation
      </div>

      <h1>
        Sexual Health Education Initiative in Pediatric Hematology–Oncology Nursing
      </h1>

      <div class="authors">
        Yael Ben David, RN, M.A.
      </div>

      <div class="affiliation">
        Pediatric Hematology–Oncology Department<br>
        Israeli Oncology Nursing Society
      </div>

      <div class="event">
        Annual Oncology Nursing Conference 2026
      </div>

      <div class="buttons">
        <a href="he.html" class="btn secondary">עברית</a>
        <a href="en.html" class="btn">English</a>
      </div>

    </section>

  </main>

</body>
</html>
